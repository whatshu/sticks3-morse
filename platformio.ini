; PlatformIO Project Configuration for M5Stack StickS3
; Board: M5Stack StickS3 (ESP32-S3 based)
; Docs: https://docs.m5stack.com/zh_CN/core/StickS3
;
; Key hardware features of StickS3:
;   - ESP32-S3FN16R8 (Flash 16MB, PSRAM 8MB)
;   - 0.85" Color TFT (128x128) — driven via ST7789, handled by M5Unified
;   - 6-axis IMU (BMI270), RTC (BM8563), Buzzer, IR TX, Button
;   - USB-C for power/programming; battery management onboard
;
; Note: The board is "esp32-s3-devkitc-1" in PlatformIO because there is no
; dedicated M5Stack StickS3 board definition. The M5Unified library handles
; the board-specific peripheral initialization automatically.

[env:m5stack-sticks3]
platform = espressif32@6.12.0
board = esp32-s3-devkitc-1
framework = arduino
board_build.arduino.partitions = default_8MB.csv
board_build.arduino.memory_type = qio_opi

build_flags =
    -DESP32S3
    -DBOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue
    -DCORE_DEBUG_LEVEL=5
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1

lib_deps =
    M5Unified=https://github.com/m5stack/M5Unified
    M5PM1=https://github.com/m5stack/M5PM1

monitor_speed = 115200
upload_port = /dev/ttyACM0
